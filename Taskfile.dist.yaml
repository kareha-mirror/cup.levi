version: "3"
env:
  CGO_ENABLED: 0
tasks:
  default:
    cmds:
      - go build ./cmd/levi
  clean:
    cmds:
      - go run ./cmd/rm levi
      - go run ./cmd/rm levi.exe
      - go run ./cmd/rm levi-light
  test:
    cmds:
      - go test ./...
  run:
    cmds:
      - go run ./cmd/levi
  fmt:
    cmds:
      - go fmt ./...
  vet:
    cmds:
      - go vet ./...
  check:
    cmds:
      - staticcheck ./...
  tidy:
    env:
      GOPRIVATE: tea.kareha.org
    cmds:
      - go get tea.kareha.org/cup/termi@latest
      - go mod tidy
  windows:
    env:
      GOOS: windows
      GOARCH: amd64
    cmds:
      - go build -o levi.exe ./cmd/levi
  light:
    cmds:
      - go build -ldflags="-s -w" -o levi-light ./cmd/levi

